<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift Box Surprise</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* මූලික සැකසුම් */
        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            /* පසුබිම් පින්තූරය Blur කිරීම සඳහා ස්ටයිල් */
            background-image: url('bg1.jpg'); /* පින්තූරයේ නම නිවැරදි දැයි බලන්න */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
        }

        /* පසුබිම Blur කිරීමට Overlay එකක් */
        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(252, 228, 236, 0.5); /* ලා පින්ක් වර්ණයක් පසුබිමට මිශ්‍ර කළා */
            backdrop-filter: blur(2px); /* පසුබිම Blur කරන ප්‍රමාණය */
            z-index: 1; /* අනෙක් දේවල් වලට පිටුපසින් තැබීමට */
        }

        .container {
            text-align: center; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 20px; width: 100%; height: 100%;
            position: relative; z-index: 2; /* BlurOverlay එකට උඩින් තැබීමට */
        }

        .gift-box-wrapper {
            position: relative; width: 250px; height: 250px;
            cursor: pointer; z-index: 10; transition: opacity 0.5s;
            margin-top: 50px;
        }

        .external-photo {
            width: 200px; height: auto; border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); /* Shadow එක තද කළා */
            transition: all 0.5s ease; z-index: 5;
        }

        .box-body {
            position: absolute; bottom: 0; width: 100%; height: 150px;
            background-color: #e91e63; border-radius: 0 0 15px 15px; z-index: 2;
        }

        .box-lid {
            position: absolute; bottom: 150px; left: -5%; width: 110%;
            height: 40px; background-color: #c2185b; border-radius: 8px; z-index: 4;
            transition: transform 1s ease-in-out;
        }

        .ribbon-vertical {
            position: absolute; left: 50%; transform: translateX(-50%);
            width: 40px; height: 100%; background-color: #fff176;
        }

        .ribbon-horizontal {
            position: absolute; top: 50%; transform: translateY(-50%);
            width: 100%; height: 40px; background-color: #fff176;
        }

        .bow {
            position: absolute; top: -60px; left: 50%; 
            transform: translateX(-50%);
            font-size: 80px; z-index: 5;
            line-height: 1;
        }

        @keyframes lidFly {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-500px) rotate(20deg); opacity: 0; }
        }

        .open .box-lid { animation: lidFly 1s forwards; }

        .hidden-page-container {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0);
            width: 90%; height: 90%; background: white;
            z-index: 100; transition: 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 20px; overflow: hidden; opacity: 0;
        }

        .show-page .hidden-page-container {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .show-page .gift-box-wrapper, 
        .show-page .external-photo,
        .show-page h2 {
            opacity: 0; pointer-events: none;
        }

        h2 { color: #c2185b; margin: 10px 0; z-index: 10; text-shadow: 1px 1px 2px white; } /* අකුරු පෙනීමට white shadow කළා */
    </style>
</head>
<body>

    <div class="container" id="mainContainer">
        

        <div class="gift-box-wrapper" id="giftBox" onclick="startAnimation()">
            <div class="box-lid">
                <div class="bow">🎀</div>
                <div class="ribbon-vertical"></div>
            </div>
            
            <div class="box-body">
                <div class="ribbon-vertical"></div>
                <div class="ribbon-horizontal"></div>
            </div>
        </div>

        <img src="images/p10.png" class="external-photo" alt="Photo">

        <div class="hidden-page-container">
            <iframe id="surpriseFrame" src="" style="width:100%; height:100%; border:none;"></iframe>
        </div>

    </div>

    <script>
        // පිටුව Load වන විට Confetti (කොළ කැබලි) විසිවීමට
        window.onload = function() {
            var duration = 3 * 1000;
            var end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 5,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#ff4081', '#ffeb3b', '#00e676']
                });
                confetti({
                    particleCount: 5,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#2196f3', '#9c27b0', '#ff9800']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        };

        function startAnimation() {
            const gift = document.getElementById('giftBox');
            const container = document.getElementById('mainContainer');

            // පෙට්ටිය ඇරෙනකොට එකවර කොළ 400ක් විසිවීමට
            confetti({
                particleCount: 400, 
                spread: 160,
                origin: { y: 0.6 },
                gravity: 0.8,
                scalar: 1.2
            });

            gift.classList.add('open');

            setTimeout(() => {
                document.getElementById('surpriseFrame').src = "intro1.html"; 
                container.classList.add('show-page');
            }, 800);
        }
    </script>

</body>
</html>
