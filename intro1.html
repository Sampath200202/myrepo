<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Wish - Loading...</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: #FFF9E6; 
            overflow: hidden;
        }

        .main-wrapper {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            min-height: 100vh; width: 100%; text-align: center;
            padding: 20px; position: relative;
        }

        .wish-header {
            z-index: 5;
            margin-bottom: 20px;
        }

        .wish-text {
            font-size: clamp(2rem, 8vw, 4.5rem);
            font-weight: 900;
            color: #FF5E8E;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1.1;
            text-shadow: 3px 3px 0px #FFDB58;
            opacity: 0;
            transform: translateY(-20px);
            animation: dropIn 1s ease-out forwards;
        }

        @keyframes dropIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .video-container {
            width: clamp(250px, 80vw, 450px);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            background: #fff;
            border: 5px solid #fff;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
            animation-delay: 0.5s;
        }

        video { width: 100%; height: auto; display: block; }

        .confetti-dot {
            position: absolute;
            width: 8px; height: 8px;
            border-radius: 50%; opacity: 0.5; z-index: 1;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        /* --- UPDATED SMALL TIMER STYLES --- */
        .timer-box {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;   /* Size Reduced */
            height: 50px;  /* Size Reduced */
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .timer-svg {
            position: absolute;
            width: 50px;
            height: 50px;
            transform: rotate(-90deg);
        }

        .timer-svg circle {
            fill: none;
            stroke-width: 3; /* Thinner line */
            stroke-linecap: round;
        }

        .timer-bg { stroke: #f0f0f0; }

        .timer-progress {
            stroke: #FF5E8E;
            stroke-dasharray: 138; /* 2 * PI * 22 */
            stroke-dashoffset: 138;
            transition: stroke-dashoffset 1s linear;
        }

        #timer-num {
            font-weight: 700;
            color: #FF5E8E;
            font-size: 0.9rem; /* Smaller font */
        }

    </style>
</head>
<body>

    <div class="main-wrapper" id="bg-wrapper">
        
        <div class="wish-header">
            <h1 class="wish-text">HAPPY BIRTHDAY DULA...!🎂</h1>
        </div>

        <div class="video-container">
            <video autoplay muted loop playsinline id="bdayVideo">
                <source src="videos/intro1.mp4" type="video/mp4">
            </video>
        </div>

        <div class="timer-box">
            <svg class="timer-svg">
                <circle class="timer-bg" cx="25" cy="25" r="22"></circle>
                <circle class="timer-progress" id="progress-bar" cx="25" cy="25" r="22"></circle>
            </svg>
            <div id="timer-num">5</div>
        </div>

    </div>

    <script>
        // 1. Confetti Background
        const wrapper = document.getElementById('bg-wrapper');
        const colors = ['#FF5E8E', '#FFDB58', '#4DD0E1', '#FFB74D'];

        for (let i = 0; i < 40; i++) {
            const dot = document.createElement('div');
            dot.className = 'confetti-dot';
            dot.style.left = Math.random() * 100 + 'vw';
            dot.style.top = Math.random() * 100 + 'vh';
            dot.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            wrapper.appendChild(dot);
        }

        // 2. Timer and Redirection
        window.addEventListener('load', function() {
            let timeLeft = 5;
            const timerNum = document.getElementById('timer-num');
            const progressBar = document.getElementById('progress-bar');
            const totalDash = 138; // 2 * PI * 22

            const timerInterval = setInterval(() => {
                timePassed = 5 - timeLeft;
                
                if (timeLeft >= 0) {
                    timerNum.innerText = timeLeft;
                    // Calculate offset for smooth filling
                    const offset = totalDash - ( (5 - timeLeft) / 5 ) * totalDash;
                    progressBar.style.strokeDashoffset = offset;
                }

                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    window.location.href = "intro2.html"; 
                }
                timeLeft--;
            }, 1000);

            // 3. Autoplay Video
            const video = document.getElementById('bdayVideo');
            video.play().catch(error => {
                document.body.addEventListener('click', () => {
                    video.play();
                }, { once: true });
            });
        });
    </script>

</body>
</html>
