<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Wish - Loading...</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        
        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: #FFF9E6; 
            overflow: hidden;
        }

        .main-wrapper {
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            min-height: 100vh; width: 100%; text-align: center;
            padding: 20px; position: relative;
        }

        .wish-header {
            z-index: 5;
            margin-bottom: 20px;
        }

        .wish-text {
            font-size: clamp(2rem, 8vw, 4.5rem);
            font-weight: 900;
            color: #FF5E8E;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
            line-height: 1.1;
            text-shadow: 3px 3px 0px #FFDB58;
            opacity: 0;
            transform: translateY(-20px);
            animation: dropIn 1s ease-out forwards;
        }

        @keyframes dropIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .video-container {
            width: clamp(250px, 80vw, 450px);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            background: #fff;
            border: 5px solid #fff;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
            animation-delay: 0.5s;
        }

        video { width: 100%; height: auto; display: block; }

        .confetti-dot {
            position: absolute;
            width: 8px; height: 8px;
            border-radius: 50%; opacity: 0.5; z-index: 1;
        }

        @keyframes fadeIn { to { opacity: 1; } }

    </style>
</head>
<body>

    <div class="main-wrapper" id="bg-wrapper">
        
        <div class="wish-header">
            <h1 class="wish-text">HAPPY BIRTHDAY...!</h1>
        </div>

        <div class="video-container">
            <video autoplay muted loop playsinline id="bdayVideo">
                <source src="videos/intro1.mp4" type="video/mp4">
            </video>
        </div>

    </div>

    <script>
        // 1. පසුබිම් අලංකරණය (Confetti)
        const wrapper = document.getElementById('bg-wrapper');
        const colors = ['#FF5E8E', '#FFDB58', '#4DD0E1', '#FFB74D'];

        for (let i = 0; i < 40; i++) {
            const dot = document.createElement('div');
            dot.className = 'confetti-dot';
            dot.style.left = Math.random() * 100 + 'vw';
            dot.style.top = Math.random() * 100 + 'vh';
            dot.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            wrapper.appendChild(dot);
        }

        // 2. පසුබිම් ටයිමරය
        window.addEventListener('load', function() {
            // තත්පර 5කට පසු intro2.html වෙත යන්න
            setTimeout(() => {
                window.location.href = "intro2.html"; 
            }, 5000);

            // 3. වීඩියෝව ස්වයංක්‍රීයව Play කිරීම
            const video = document.getElementById('bdayVideo');
            video.play().catch(error => {
                document.body.addEventListener('click', () => {
                    video.play();
                }, { once: true });
            });
        });
    </script>

</body>
</html>
